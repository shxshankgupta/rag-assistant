version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      target: runtime
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Uncomment to use Postgres instead of SQLite:
      # - DATABASE_URL=postgresql+asyncpg://rag:rag@db:5432/ragdb
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
    volumes:
      - ./data:/app/data          # persist uploads + FAISS index
      - ./.env:/app/.env:ro
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      target: runtime
    container_name: rag_worker
    command: celery -A app.workers.celery_app worker -l INFO
    environment:
      - APP_ENV=development
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      - redis
    restart: unless-stopped

  # ── Optional: Postgres ──────────────────────────────────────────────────────
  # db:
  #   image: postgres:16-alpine
  #   container_name: rag_postgres
  #   environment:
  #     POSTGRES_USER: rag
  #     POSTGRES_PASSWORD: rag
  #     POSTGRES_DB: ragdb
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  pgdata:
